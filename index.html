<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Issues Tracker</title>

    <!-- tailwind and daisyui -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- style css -->
     <link rel="stylesheet" href="style.css">

    <!-- google fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
</head>
<body class="font-geist">

    <!-- login page -->
     <div id="login-page" class="min-h-screen flex items-center justify-center">
        <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md text-center border">
            <img src="assets/github-logo.png" alt=""  class="w-16 mx-auto mb-4">
            <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
            <p class="text-gray-500 mb-6 text-sm">Sign in to manage your issues</p>

            <div class="text-left space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Username</label>
                    <input type="text" id="username" placeholder="Enter Username" class="w-full border p-2 rounded focus:outline-blue-500">
                    <p class="text-xs text-blue-600 mt-1">Default: admin</p>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Password</label>
                    <input type="password" id="password" placeholder="Enter Password" class="w-full border p-2 rounded focus:outline-blue-500">
                    <p class="text-xs text-blue-600 mt-1">Default: admin123</p>
                </div>
                <button id="login-btn" class="w-full bg-blue-600 text-white py-2 rounded font-semibold hover:bg-blue-700">Sign In</button>
            </div>

            <div class="mt-6 border-t pt-4">
                <p class="text-xs text-gray-400 mb-2 uppercase">OR</p>
                <div class="bg-gray-50 p-3 rounded text-sm">
                    <p><strong>Username:</strong> admin</p>
                    <p><strong>Password:</strong> admin123</p>
                </div>
            </div>
        </div>
     </div>

     <div id="main-content" class="hidden">
        <nav  class="bg-white border-b p-4 flex justify-between items-center sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <img src="assets/github-logo.png" alt="" class="w-8">
                <span class="font-bold text-lg hidden md:block">GitHub Issues Tracker</span>
            </div>
            <div class="flex gap-2">
                <input type="text" id="search-input" placeholder="Search issues..." class="border p-2 rounded text-sm w-48 md:w-64">
                <button id="new-issue-btn" class="bg-blue-600 text-white px-4 py-2 rounded text-sm">+ New Issue</button>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto p-4 md:p-8">
            <div class="flex gap-2 mb-6 bg-gray-100 p-1 rounded-lg w-fit">
                <button onclick="filterIssues('all')" class="tab-btn px-6 py-2 rounded-md transition bg-blue-600 text-white" data-type="all">All</button>
                <button onclick="filterIssues('open')" class="tab-btn px-6 py-2 rounded-md transition" data-type="open">Open</button>
                <button onclick="filterIssues('closed')" class="tab-btn px-6 py-2 rounded-md transition" data-type="closed">Closed</button>
            </div>

            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-2">
                    <span id="issue-count" class="font-bold text-xl">0 Issues</span>
                </div>

                <div class="flex gap-4 text-sm font-medium">
                    <span class="text-green-600"> Open</span>
                    <span class="text-purple-600"> Closed</span>
                </div>
            </div>

            <div id="loader" class="text-center py-20 hidden">
                <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mx-auto"></div>
            </div>

            <div id="issues-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                </div>
        </main>
     </div>

     <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center p-4 z-[100]">
        <div class="bg-white rounded-xl max-w-2xl w-full p-6 relative">
            <div id="modal-content"></div>
            <button onclick="closeModal()" class="mt-6 w-full bg-blue-600 text-white py-2 rounded-lg">Close</button>
        </div>
     </div>
    

     <script src="script.js"></script>
</body>
</html>
